# Purpose: Example worker-to-model routing for the Feberdin multi-agent team.
# Input/Output: The shared LLM client reads this file to map worker roles to concrete local models, timeouts, and output contracts.
# Invariants:
#   - Strukturierte Worker bevorzugen standardmaessig Mistral fuer robustere parsebare Antworten.
#   - Bei laengeren echten Laeufen haben Research, Architecture und Coding stabiler mit Mistral als Primärmodell reagiert.
#   - Qwen bleibt fuer semantisch schwierige Faelle als expliziter Fallback erhalten.
#   - Fallbacks bleiben explizit und nachvollziehbar statt still implizit.
# Debugging:
#   - Wenn ein Worker das falsche Modell nutzt, pruefe zuerst diesen Eintrag und danach die gesetzten Provider-ENV-Werte.
#   - Wenn ein Worker an freier Prosa statt JSON scheitert, achte auf `output_contract` und `routing_note`.

workers:
  requirements:
    primary_provider: mistral
    fallback_provider: qwen
    temperature: 0.1
    max_tokens: 1400
    budget_tokens: 5000
    request_timeout_seconds: 900
    reasoning: low
    output_contract: json
    routing_note: Bevorzugt robusten, strikt parsebaren JSON-Output fuer Anforderungen.

  cost:
