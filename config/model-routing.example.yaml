# Purpose: Example worker-to-model routing for the Feberdin multi-agent team.
# Input/Output: The shared LLM client reads this file to map worker roles to primary and fallback local models.
# Invariants: Lightweight stages default to Mistral for lower latency; Qwen is reserved for clearly heavier reasoning stages unless operators override the file explicitly.
# Debugging: If a worker uses the wrong model, inspect its entry here and the provider environment variables in `.env`.

workers:
  requirements:
    primary_provider: mistral
    fallback_provider:
    temperature: 0.1
    max_tokens: 1400
    budget_tokens: 5000
    request_timeout_seconds: 45
    reasoning: low
  cost:
    primary_provider: mistral
    fallback_provider:
    temperature: 0.0
