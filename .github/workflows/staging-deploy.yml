# Purpose: Controlled staging deployment workflow for repositories using an Unraid self-hosted runner.
# Input/Output: Deploys a PR branch or manually selected ref to staging after explicit dispatch or authorized PR comment.
# Invariants: This workflow targets staging only and does not merge or promote to production.
# Debugging: If jobs remain queued, confirm the self-hosted runner labels and repository registration.

name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/deploy-staging') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: [self-hosted, linux, unraid, staging]
    steps:
      - name: Resolve branch
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.issue.number }}/head" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.branch }}

      - name: Run staging deployment script
        env:
          STAGING_PROJECT_DIR: ${{ secrets.STAGING_PROJECT_DIR }}
          STAGING_COMPOSE_FILE: ${{ secrets.STAGING_COMPOSE_FILE }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ./scripts/unraid/deploy-staging.sh \
            "$PWD" \
            "$STAGING_PROJECT_DIR" \
            "$STAGING_COMPOSE_FILE" \
            "${{ steps.ref.outputs.branch }}" \
            "$STAGING_SSH_USER" \
            "$STAGING_SSH_HOST" \
            "$STAGING_SSH_PORT"
