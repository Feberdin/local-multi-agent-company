# Purpose: Main Unraid-friendly compose stack for the Feberdin multi-agent development company.
# Input/Output: Docker Compose starts the orchestrator, worker team, dashboard, and optional adapters with persistent volumes.
# Invariants: All stateful data is stored in mounted appdata paths, and every service exposes a health endpoint.
# Debugging: If startup ordering fails, inspect the worker health endpoints and the shared `agent-control` network first.

x-agent-runtime-volumes: &agent-runtime-volumes
  - ${HOST_DATA_DIR:-./data}:/data
  - ${HOST_REPORTS_DIR:-./reports}:/reports
  - ${HOST_WORKSPACE_ROOT:-./workspace}:/workspace
  - ${HOST_STAGING_STACK_ROOT:-./staging-stacks}:/staging-stacks
  - ${HOST_SECRETS_DIR:-./secrets}:/run/project-secrets:ro
  - ./:/app

x-agent-service: &agent-service
  build:
    context: .
    dockerfile: docker/Dockerfile.agent-service
    args:
      BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-}
      BUILD_GIT_REF: ${BUILD_GIT_REF:-}
      BUILD_BUILT_AT_UTC: ${BUILD_BUILT_AT_UTC:-}
  env_file: [".env"]
  user: "${PUID:-99}:${PGID:-100}"
  volumes: *agent-runtime-volumes
  networks: [agent-control]
  restart: unless-stopped

services:
  orchestrator:
    <<: *agent-service
    container_name: fmac-orch
    command: ["uvicorn", "services.orchestrator.app:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      SERVICE_NAME: orchestrator
      SERVICE_PORT: 8080
    ports:
      - "${ORCHESTRATOR_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

